name: Backend CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Kodu Sunucuya Cek (Checkout)
      uses: actions/checkout@v3

    - name: Python 3.11 Kurulumu
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Gerekli Kutuphaneleri Yukle
      run: |
        python -m pip install --upgrade pip
        pip install flask flask-sqlalchemy pytest pytest-cov

    - name: Otomatik Testleri Calistir
      run: |
        pytest --cov=. test_app.py